<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Onyx Reports">
  <defs>
    <linearGradient id="onyx-bg" x1="6" y1="4" x2="26" y2="28" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2D3142"/>
      <stop offset="1" stop-color="#0F1419"/>
    </linearGradient>
    <linearGradient id="onyx-gem" x1="16" y1="6" x2="16" y2="26" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4A5168"/>
      <stop offset="0.45" stop-color="#1A1F2E"/>
      <stop offset="1" stop-color="#0A0D12"/>
    </linearGradient>
    <linearGradient id="onyx-band" x1="5" y1="16" x2="27" y2="16" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="onyx-shine" x1="10" y1="8" x2="14" y2="12" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Fond arrondi -->
  <rect width="32" height="32" rx="8" fill="url(#onyx-bg)"/>
  <rect x="0.5" y="0.5" width="31" height="31" rx="7.5" fill="none" stroke="#8B92A9" stroke-opacity="0.22"/>

  <!-- Gemme onyx (losange) -->
  <path d="M16 6.5 L24.5 16 L16 25.5 L7.5 16 Z" fill="url(#onyx-gem)"/>
  <path d="M16 6.5 L16 25.5" stroke="#8B92A9" stroke-opacity="0.28" stroke-width="0.6"/>
  <path d="M7.5 16 L24.5 16" stroke="#8B92A9" stroke-opacity="0.18" stroke-width="0.6"/>

  <!-- Bande caractťristique de l'onyx -->
  <rect x="6" y="14.6" width="20" height="2.8" rx="1.4" fill="url(#onyx-band)"/>

  <!-- Reflet -->
  <ellipse cx="12.2" cy="10.8" rx="3.2" ry="2.1" fill="url(#onyx-shine)" transform="rotate(-28 12.2 10.8)"/>
</svg>
